body:
  text: 卷二證治寒熱總訣寒熱陰陽朕兆機互根互換理難知或虛或實分真假表裡能明乃可醫發熱惡寒皮毛灑淅無汗者風寒閉膚表也宜原方麻黃湯麻黃七分桂枝二錢杏仁三錢甘草一錢歌曰惡寒發熱汗無流麻桂經方仔細求杏助麻黃甘助桂皮毛灑淅此方投伯未按余家遇感冒不服藥購防風五錢紫蘇五錢荊芥五錢薄荷三錢洗湯蒙首熏待背上汗出口流冷涎即已發熱惡風翕翕然而自汗者風寒襲腠里也宜原方桂枝湯桂枝二錢白芍三錢甘草炙二錢大棗四枚生薑三片歌曰熱兼汗出忌風吹湯用生薑及桂枝芍棗和甘營氣順解肌還賴粥漿隨但熱不寒口乾舌燥便黃者陽明之燥熱也宜原方白虎湯石膏三錢知母三錢甘草一錢粳米二錢歌曰但熱無寒小便黃口乾舌燥渴難當知膏粳草生津液白虎原方仔細詳但寒不熱並無燥渴等證者少陰之陽虛也宜長沙附子湯附子二錢白朮三錢人參二錢雲苓三錢甘草一錢歌曰但寒無熱少陰虛朮附回陽體自舒甘草參苓俱補氣氣和身暖病能除皮膚髮熱夜晚潮熱更甚者陰血不濡陽也宜當歸補血湯當歸三錢生地三錢黃耆二錢人參二錢枯芩三錢合歡皮二錢山萸三錢百合三錢麥冬三錢黃柏二錢龜板二錢慈竹葉一錢歌曰皮膚髮熱夜來增滋補歸萸地合參柏龜芩冬合歡竹黃耆益氣液升騰子午發熱睡後更覺盜汗者虛勞骨蒸熱也宜柴胡清蒸湯柴胡一錢黃芩三錢當歸二錢白芍三錢生地三錢丹皮一錢桃仁二錢蒲黃三錢膽草二錢雲苓三錢貝母二錢杏仁三錢甘草一錢鱉甲炙黃二錢歌曰盜熱常居子午時夜來更甚用丹皮桃蒲歸芍柴芩地膽鱉甘苓貝杏施寒熱往來發作有定時候者少陽經瘧疾也宜獨活黃芩湯獨活五分黃芩三錢知母三錢柴胡三錢羌活五分花粉三錢檳榔一錢厚朴一錢枳殼一錢杏仁三錢炒梔三錢石膏三錢歌曰往來寒熱用柴芩二活知膏杏枳尋花粉檳榔梔朴草薄荷加入瘧難侵伯未按若瘧發三四次後用柴胡黃芩常山草果生薑大棗煎服即止惟服時在瘧發前一小時又三陰瘧不愈者以鵝卵於朔望日生者煮熟食立已朝發寒冷入夜則又發熱者陽氣陷入陰也宜補中益氣湯人參二錢白朮三錢甘草二錢陳皮一錢茯苓三錢黃耆一錢升麻一錢當歸三錢柴胡一錢生薑三片大棗四枚歌曰朝寒夜熱用升麻再入參歸術草偕陳茯黃耆薑共棗補中能使氣和諧身熱面赤下利清水完穀者裡寒而外熱也宜加味白通湯乾薑二錢附子二錢蔥白五根甘草一錢豬膽一個歌曰面紅身熱似陰虧下利緣何谷未糜溫裡急需薑與附蔥和膽草作湯醫身熱面赤煩躁欲臥泥水者陰甚而格陽也宜益元艾附湯人參二錢乾薑二錢附子二錢艾葉一錢白朮二錢茯苓三錢黃連一錢甘草一錢知母三錢五味一錢故紙二錢香附一錢歌曰熱煩欲臥水泥中陰甚需參薑附攻互用知連冬味草苓蔥紙艾性溫通春月發熱氣喘而口乾渴者感風熱之氣也宜加減麻杏湯杏仁三錢麻黃八分石膏三錢甘草一錢殭蠶三錢知母三錢花粉三錢連翹二錢銀花二錢白芍三錢蟬蛻七個菊花一錢牛蒡子一錢歌曰渴兼發熱在春天麻杏知膏急與煎花粉銀翹牛蒡菊再加芍草共蠶蟬夏月發熱口渴而心煩懊者傷暑熱之氣也宜加味六一散炒梔三錢麥冬二錢滑石三錢甘草一錢黃芩二錢花粉三錢杏仁三錢香薷一錢厚朴二錢木通二錢石膏三錢荊芥一錢知母三錢銀花二錢歌曰夏天熱渴暑為殃滑草梔冬芩粉詳通朴杏薷膏合芥銀花知母性清涼嘔吐總訣寒熱陰陽細品詳總因氣逆嘔斯生降沖安胃開邪拒氣不奔騰嘔自平嘔吐不食水飲不得入口者火熱相拒隔也宜人參乾薑湯人參三錢黃連三錢黃芩三錢乾薑五分歌曰嘔時拒隔水難嘗多用芩連少用薑惟有人參能養液主方重使卻無妨嘔吐能食食入即時吐出者兩熱相爭沖也宜酒蒸大黃湯大黃三錢甘草一錢歌曰嘔吐雖能納水漿即時吐出胃脾傷只緣兩熱相爭競酒水同烹草與黃食久乃吐兼見大腹脹滿者脾經乏火化也宜薑附六君湯人參二錢白朮三錢雲苓三錢甘草一錢半夏二錢陳皮一錢乾薑一錢附子二錢歌曰食飯經時嘔吐頻更兼腹滿病原真人參附片薑和術半夏雲苓甘與陳食久乃吐兼見胸前脹滿者胃府之虛寒也宜香砂養胃湯木香二錢砂仁二錢白朮二錢雲苓三錢陳皮一錢半夏二錢人參二錢甘草一錢大棗四枚生薑三片歌曰食久胸前脹滿增香砂治嘔有奇能參苓棗夏俱同煮術草薑陳也共蒸食久乃吐吐出多帶水液者腎部之虛寒也宜仲景真武湯白朮三錢雲苓三錢白芍三錢生薑三片附子三錢歌曰腎寒嘔吐水津多術芍雲苓薑附科薑附散寒為主藥術苓平胃共調和伯未按若嘔吐苦水或酸水或緑水而不能飲食者吳萸黃連濃煎緩咽食久乃吐吐出多帶酸水者肝藏有寒熱也宜仲景烏梅丸烏梅三個人參二錢黃柏二錢黃連二錢當歸三錢乾薑一錢細辛五分桂枝一錢附子二錢花椒一錢伯未按蜀刻本作宜吳茱萸原方方用吳萸生薑人參大棗歌曰食已經時吐帶酸梅連桂附善平肝薑辛椒柏當歸研再入人參裹作丸單吐痰涎或兼咳嗽頭痛者胃中有痰飲也宜加味二陳湯陳皮二錢半夏二錢雲苓三錢甘草一錢生薑三片竹瀝一勺黃芩三錢伯未按蜀刻本無黃芩歌曰單吐痰涎用二陳夏陳苓草竹薑勻黃芩加入兼清熱熱淨痰除效若神單吐酸水或兼頭痛如破者肝寒氣上逆也宜加味左金丸吳萸二錢黃連一錢人參二錢雲苓三錢細辛五分苡仁三錢歌曰單吐酸宜用左金參苓細苡共連尋辛溫獨取吳萸性肝氣平時病不侵伯未按一味吳萸濃煎服亦效肉桂粉亦佳嘔吐不止兼見腹痛下利者脾氣之虛脫也宜附子理中湯附子二錢白朮三錢人參二錢甘草一錢乾薑一錢歌曰吐兼下利責脾虛參草和中是急需附術乾薑仍合用理中湯服病當除嘔吐發熱或兼口苦胸滿者少陽之逆氣也宜原方柴胡湯黃芩三錢柴胡一錢人參二錢生薑三片半夏三錢甘草一錢大棗四枚歌曰吐兼發熱用柴芩只為三焦逆氣侵夏草薑參同大棗長沙舊法細推尋卒然嘔吐兼見發悶噁心者感瘴厲異氣也宜藿香正氣散白朮三錢半夏三錢雲苓三錢白芷二錢腹皮二錢生薑三片砂仁二錢厚朴一錢陳皮一錢桔梗一錢紫蘇一錢藿香一錢甘草一錢大棗四枚歌曰卒吐還兼發噁心瘴鄉芷朴急當尋術苓夏腹砂陳桔藿草薑蘇棗共斟咳嗽總訣肺氣如鍾撞則鳴或痰或血治須分再加和胃疏肝法咳血之原即此尋外感咳嗽吐痰清白而涎者傷寒有水氣也宜小青龍原方桂枝二錢半夏三錢麻黃七分甘草一錢乾薑一錢細辛五分白芍二錢五味一錢歌曰傷寒咳嗽吐痰清五味薑辛一劑烹夏芍麻黃同桂草長沙遺法貴研精外感咳嗽吐痰黃色而黏者傷風動火氣也宜新方麥冬湯麥冬三錢黃芩二錢桔梗一錢桑皮二錢栝蔞三錢杏仁三錢貝母三錢柴胡二錢雲苓三錢紫菀二錢薄荷一錢花粉三錢枳殼一錢甘草一錢歌曰咳嗽痰黏風火傷冬芩桑桔與瓜霜枳荷貝杏同花粉紫菀柴苓甘草詳伯未按荸薺蘿蔔汁二兩燉溫分二次飲頗驗久咳上氣痰涎多而聲易者肺腎之陽虛也宜加味真武湯白朮三錢雲苓三錢白芍三錢五味七分附子三分乾薑二分細辛五分歌曰久咳痰多肺腎虧薑辛五味總當知雲苓術芍還加附真武名湯治法推久咳上氣聲乾澀而痰凝者肺腎之陰虛也宜加味豬苓湯阿膠二錢百合三錢麥冬三錢貝母一錢澤瀉二錢滑石二錢豬苓二錢五味七分雲苓三錢丹皮二錢海粉一錢生地三錢歌曰久咳聲干痰亦凝陰虛膠味二苓增澤丹滑地冬和母海粉還加百合蒸伯未按咳唾膿血胸脹滿此屬肺癰用葶藶一錢大棗四枚與服或陳醃芥滷飲之甚效小兒咳嗽連嗆數十餘聲者肝血之不和也宜加味逍遙散當歸二錢白芍二錢雲苓三錢柴胡二錢煨薑二錢薄荷一錢丹參二錢香附二錢半夏二錢黃芩二錢五味七分丹皮一錢白朮二錢甘草一錢歌曰小兒嗆咳用逍遙薑薄柴芩味治標丹芍參歸香附草術和苓夏使痰銷婦人乾咳由於經水不行者衝任之氣逆也宜變化柴胡湯柴胡一錢香附三錢元胡二錢當歸三錢丹皮三錢雲苓三錢貝母三錢黃芩二錢麥冬三錢牛膝一錢桃仁二錢法夏二錢白芍三錢甘草一錢歌曰婦人乾咳不行經香附元胡芍共苓丹夏柴歸甘與貝芩冬桃膝服之靈喘齁總訣喘齁二證本多痰亦有虛時屬腎關開口便言中氣弱那知化氣水須捐氣緊喘促鼻塞聲音不利者風寒閉肺竅也宜蘇子降氣湯蘇子二錢半夏一錢當歸二錢陳皮二錢生薑二錢厚朴一錢沉香一錢前胡三錢柴胡二錢甘草一錢歌曰喘促寒凝鼻不通薑陳蘇子夏歸同柴前朴草沉香入順氣除痰力量洪氣喘而促審系呼出氣短者內有停水飲也宜二陳五苓散半夏二錢五味五分甘草一錢陳皮二錢白朮二錢豬苓二錢澤瀉二錢雲苓三錢桂尖二錢細辛五分歌曰喘促多緣水飲停當從出氣審情形甘陳夏味辛兼術桂澤豬苓與茯苓氣喘而促審系吸入氣短者腎中之氣虛也宜八味腎氣丸熟地三錢山藥二錢茯苓三錢丹皮三錢肉桂一錢澤瀉三錢山茱萸二錢附子炮三錢歌曰吸時氣短喘因虛桂附丹萸藥籠儲山藥雲苓兼澤瀉地黃滋補氣寬舒齁鼾有聲喉中漉漉不利者痰氣為寒阻也宜破痰射干丸射干二錢半夏二錢陳皮二錢百部二錢冬花二錢細辛五分五味五分乾薑一錢貝母二錢雲苓三錢郁李二錢枳殼一錢皂角打一錢歌曰喘齁痰響總因寒方用薑辛夏射干百部陳皮冬味合貝苓皂郁枳同攢伯未按痰哮症可用漂淡陳海蜇及海帶煎湯以生蘿蔔搗汁和服喘齁氣逆噫咳痰塞溺黃者肺胃之火逆也宜清熱降逆湯生地三錢白芍三錢石膏三錢知母三錢花粉三錢射干二錢甘草一錢黃芩二錢枳殼一錢旋覆二錢杏仁三錢赭石三錢硼砂一錢歌曰喘齁痰塞溺兼黃地芍知膏花粉詳草杏枳芩旋覆赭硼砂加入射干良伯未按蜀刻本無黃芩失血總訣血隨氣布要循經氣上因而血沸騰降逆消瘀為妙訣莫施補劑致癆蒸驟然吐血兼見頭痛寒熱者外感傷經脈也宜麻黃芍藥湯藕節二錢枯芩一錢生地二錢川芎五分白芍三錢當歸三錢麻黃八分丹皮二錢香附三錢麥冬三錢杏仁三錢蒲黃一錢枳殼一錢甘草一錢歌曰失血頭痛外感傷藕芩地芍與麻黃歸芎香附丹蒲杏枳草和冬煮與嘗吐血口渴脈洪數而溺赤者火熱傷陰分也宜加味四生丸生地三錢艾葉一錢柏葉三錢荷葉三錢丹皮三錢枯芩三錢酒軍七分知母三錢花粉三錢牛膝一錢茅根三錢馬通即白馬屎一兩泡取水歌曰脈洪失血渴難當知地丹芩與大黃牛膝馬通花粉入茅荷艾柏葉同嘗吐血口和脈弦微而溺清者陽虛而陰脫也宜變化理中湯黨參二錢黃耆二錢黑薑八分甘草一錢白芍二錢白朮二錢五味五分當歸三錢木香一錢側柏二錢醋艾一錢馬通即白馬屎一兩泡取水歌曰脈微血脫溺還清薑草參耆芍共烹術味馬通歸柏艾木香加入病能輕吐後口渴血帶黑而腹痛者瘀血積腹裡也宜加味四物湯生地三錢當歸三錢川芎一錢桃仁研三錢白芍三錢大黃一錢丹皮三錢香附三錢枳殼一錢降香一錢歌曰血方吐過口旋干腹痛瘀停歸地餐芎枳降香香附子大黃加芍佐桃丹吐血之前必先大發噁心者血潮而凌心也宜鬱金丹皮湯鬱金二錢生地三錢麥冬三錢牛膝二錢五味七分丹皮二錢炒梔二錢當歸二錢白芍二錢玉竹二錢棗仁二錢知母一錢木香二錢硃砂研沖服八分歌曰
地榆湯麻仁三錢地榆三錢當歸三錢白芍二錢杏仁二錢銀花一錢黃芩三錢黃連一錢槐實二錢桔梗一錢生地三錢牛蒡子二錢歌曰和血能將痔漏除槐榆歸芍總當儲芩連牛蒡同麻杏地桔銀花燥熱祛大便總訣大便無分結與溏只將寒熱細評章至於痢證尤難治還望醫師妙主張大腸不通口渴而小便黃者陽明之燥結也宜加味承氣湯生地三錢花粉三錢大黃二錢芒硝一錢枳殼一錢厚朴二錢甘草一錢歌曰陽明燥結便難通口渴硝黃枳樸攻甘草兼能清胃火生津花粉地黃同大便不通口和而小便清者脾寒氣凝結也宜加味理中湯當歸三錢白芍炒三錢人參二錢白朮二錢乾薑一錢甘草一錢歌曰小便清和大便難歸參薑朮治脾寒再加白芍和甘草氣順腸通腹自寬大便溏泄其色青白完穀者脾經寒濕氣也宜加味胃苓湯蒼朮二錢陳皮二錢甘草炙一錢茯苓三錢桂枝二錢附子二錢大棗四枚白朮三錢黨參二錢豬苓二錢澤瀉二錢肉蔻一錢乾薑一錢白芍二錢歌曰大便溏時谷尚完總宜桂附蔻姜攢二苓二術和陳樸棗芍熬同澤草餐伯未按久瀉不愈生蔥杵爛入黃丹為丸如豆大填臍中大便溏瀉其色濁垢膠膩者腸中之濕熱也宜清熱滌腸湯杏仁三錢滑石二錢木通二錢厚朴二錢黃芩三錢車前子一錢梔子二錢綠豆三錢甘草二錢澤瀉二錢生地三錢白芍三錢黃連二錢當歸二錢歌曰便溏濁垢法當清杏芍芩連綠豆烹歸地黃前同滑澤甘和梔樸煮湯成大便溏瀉必在五更時分者腎寒而侮脾也宜加味四神丸附子二錢肉蔻二錢白朮三錢雲苓三錢大棗四枚甘草炙一錢吳萸二錢乾薑一錢人參三錢五味一錢生薑三片粟殼一錢歌曰五更瀉泄附姜投參朮吳萸甘棗收肉蔻味苓姜粟殼腸鳴無覆水幽幽大便完穀食入即刻利出者肺熱而暴注也宜瀉肺止利湯黃芩二錢知母三錢黃連二錢大黃一錢石膏三錢桔梗一錢葛根二錢桑皮二錢人參二錢生地三錢白芍二錢粟殼一錢歌曰莫將完穀認虛寒協熱偏宜知地餐參芍芩連桑與葛大黃粟殼桔膏攢便瀉赤白下部逼脹難通者濕熱鬱為痢也宜加減芍藥湯柴胡一錢當歸二錢白芍三錢甘草一錢檳榔二錢葛根三錢杏仁三錢桔梗二錢木香二錢黃芩二錢黃連二錢綠豆三錢銀花一錢荷葉二錢歌曰痢症都緣濕熱侵兼紅兼白用歸芩檳榔銀葛香柴芍杏草連荷桔豆尋伯未按用陳紅茶葉山楂炭紅白沙糖各三錢煨姜一錢極簡效便痢純赤或見口渴溺赤者熱結在血分也宜地榆白頭湯黃連二錢黃芩二錢黃柏二錢秦皮三錢地榆二錢白頭翁三錢當歸二錢白芍三錢銀花炭一錢丹皮二錢歌曰紅痢當從血分醫丹秦榆柏芍歸隨白頭翁與芩連共再入銀花病自離伯未按或用一味白頭翁煎服或用鴉膽子七粒桂圓肉包吞服下痢純白但見裡急下重者熱鬱在氣分也宜膏芩清痢散黃芩二錢石膏二錢兜鈴二錢防己二錢銀花二錢知母三錢杏仁三錢滑石二錢枳殼一錢荷梗三錢芍藥三錢甘草一錢歌曰痢如純白治如何膏杏銀防枳與荷滑草兜鈴知共芍服之病氣漸調和下痢禁口其人飲食不納者邪熱傷中氣也宜人參開禁湯人參三錢黃連二錢黃芩三錢石膏三錢知母三錢連翹二錢木香一錢花粉三錢麥冬三錢桔梗一錢葛根二錢銀花一錢荷梗二錢甘草一錢歌曰禁口多緣津液枯膏冬參粉極滋濡銀翹葛根芩連共知桔香荷甘草俱大便久痢諸藥不能禁止者寒熱之錯雜也宜姜連四神丸乾薑二錢黃連二錢烏梅四枚白芍三錢甘草一錢歌曰久痢諸湯治不靈姜連梅芍草梢增症兼寒熱宜斟酌漫借經方炫己能小便總訣三焦決瀆為出路肺主通調脾轉布但治小腸與膀胱世人那得知其故小便赤短別無外證內傷者小腸經火氣也宜加味導赤散生地三錢木通二錢草梢一錢竹葉一錢滑石二錢山梔三錢黃芩三錢歌曰小便緣何見赤黃木通甘草地芩詳山梔竹葉同鍋煮滑石煎湯病即康伯未按以銀花生地及通天草代飲輕者亦能已小便白濁甚則盡如米飲者脾經之濕氣也宜萆薢分清飲萆薢一錢菖蒲二錢甘草一錢益智二錢烏藥三錢神麯一錢青鹽五分歌曰脾經濕氣犯膀胱小便雖通濁似漿萆薢菖蒲鹽曲共草梢烏藥智仁匡伯未按宜少食油類小便短澀每溺則澀而痛者膀胱之熱淋也宜車前五淋散當歸三錢白芍三錢赤苓三錢梔仁三錢甘草一錢燈心三分車前子二錢歌曰熱結膀胱用五淋莖中痛澀芍歸尋車前甘草山梔共赤茯苓加燈草心小便不通點滴俱不能出者膀胱之熱結也宜滋腎通關丸黃柏三錢知母三錢安桂三分歌曰膀胱熱結便殊艱知柏滋陰豈等閒安桂少加為反佐蜜丸湯下號通關小便帶血或兼莖中割痛者熱動胞中血也宜加味五苓散當歸三錢赤芍二錢甘草一錢牛膝一錢鬱金一錢生地三錢膽草一錢白芍三錢梔仁二錢燈心五分桃仁三錢木通一錢車前子一錢麝香三釐歌曰小便緣何帶血絲桃歸二芍鬱金施地前通膽梔和麝牛膝燈心甘草隨伯未按生地汁茅根汁和服亦有效小便不通諸藥俱不效驗者氣道迫塞故也宜通氣麻杏湯麻黃七分杏仁三錢甘草一錢歌曰小便難通治法窮麻黃甘杏奏奇功只緣氣道多堅阻透達元陽水自融伯未按當予導尿小便過多以及遺溺不禁者膀胱與腎寒也宜附子溫腎丸附子二錢安桂一錢熟地三錢山萸三錢白朮三錢青鹽五分歌曰小便嫌多腎要溫山萸桂附術鹽吞加來熟地兼滋補遺溺方須究本原伯未按初期可買縮泉丸吞服三錢

body:
  text: 卷一證治頭骨總訣頭乃三陽所總司藥分三面按經施若還眩運分虛實瀉實滋虛兩路馳頭痛在後或兼發熱惡寒者太陽經傷寒也宜加味敗毒散沙參二錢羌活二錢獨活二錢柴胡二錢前胡三錢川芎一錢桔梗三錢雲苓三錢枳殼一錢甘草一錢葛根二錢大棗二枚蔥白一根生薑三片歌曰後面頭疼敗毒湯柴前芎桔獨參羌枳苓蔥葛甘和棗引用生薑入太陽伯未按民間用生薑片貼兩太陽亦有幫助頭痛在側或兼寒熱往來者少陽經傷風也宜加味柴胡湯半夏三錢柴胡三錢竹茹三錢玉竹三錢黃芩三錢白芍三錢鉤藤三錢甘草一錢生薑三片大棗二枚歌曰頭痛在側少陽風祛邪專賴夏柴功竹茹玉竹姜和棗甘草鉤藤芩芍同伯未按蜀刻本鉤藤作荊芥頭痛在前或兼發熱口渴者陽明經傷熱也宜加味升葛湯白芍三錢葛根三錢黃芩三錢白芷三錢花粉四錢升麻一錢甘草一錢歌曰頭痛在前熱渴加芍芩葛根暨升麻草偕花粉能生液白芷祛邪力最賒雷頭風痛或偏在左在右者陽虛中風寒也宜艾灸鹽摩法艾茸麝香作小粒灸痛處附子末和鹽摩之再服加味白通湯方見下節歌曰雷頭風痛附鹽摩麝艾同燒不在多加味白通姜附術蔥耆參草與調和伯未按清震湯亦可服用升麻八分蒼朮一錢荷葉一角頭痛如碎每遇陰雨更甚者真陽不上頭也宜加味白通湯白朮三錢黃耆三錢黨參三錢附子三錢乾薑二錢甘草一錢蔥白三根歌曰每逢陰雨痛無休只為真陽不上頭仍用白通加味服但須一劑病全瘳頭痛如破兼見嘔吐涎沫者肝經寒飲逆也宜加味吳萸湯吳萸二錢黨參三錢雲苓三錢桂尖三錢半夏三錢白芍三錢細辛五分甘草一錢大棗三枚生薑三片歌曰頭痛如破吐痰涎飲逆肝寒薑棗全參草吳萸辛桂用雲苓夏芍入湯煎頭暈鬱冒其人煩渴悶滿者火挾痰上泛也宜加味銀菊湯頭重加酒軍白菊一錢銀花三錢花粉三錢雲苓三錢甘草一錢枳殼一錢旋覆炙三錢黃芩三錢柴胡三錢杏仁三錢薄荷一錢竹茹三錢歌曰頭暈鬱冒銀菊醫柴苓花粉杏旋施竹茹芩枳和甘草加入薄菏能散之伯未按蜀刻本無白菊銀花花粉枳殼頭暈飄搖其人兩顴發赤者腎經虛火動也宜加味地黃湯熟地四錢山茱萸三錢茯苓三錢丹皮三錢山藥三錢澤瀉三錢安桂一錢牛膝二錢附子三錢川芎一錢細辛五分麥冬三錢元參三錢磁石研三錢歌曰飄搖頭暈腎經虛地澤丹元山藥俱桂附芎辛磁膝引冬苓滋養佐茱萸伯未按倏時頭眩眼花無所見者用熟地一兩黨參五錢煎服兩耳總訣耳雖腎竅辨聲音繞耳遊行是膽經時輩不知清木火漫將滋腎詡高明耳鳴耳聾或兼口苦寒熱者少陽經風熱也宜仲景柴胡湯柴胡三錢人參二錢黃芩三錢半夏三錢甘草一錢生薑三片大棗二枚歌曰耳鳴寒熱或兼聾棗草參苓姜夏同風中少陽柴作引方原仲景妙無窮伯未按耳暴聾木香研末酒浸一宿以酒滴耳中耳鳴耳聾或兼脅痛善怒者肝經之火鬱也宜加味瀉肝湯當歸三錢生地三錢柴胡三錢黃芩三錢梔子三錢澤瀉三錢木通二錢膽草三錢車前子三錢牡蠣三錢青皮一錢甘草一錢歌曰耳鳴脅痛瀉肝湯龍膽車前牡蠣匡通澤梔芩柴地用青皮歸草合成方伯未按夏枯花五錢濃煎服之極簡效耳鳴耳聾並無障礙壅閉者腎虛陰氣逆也宜加味磁朱丸磁石三錢硃砂一錢熟地四錢山藥三錢雲苓三錢澤瀉三錢丹皮三錢山茱萸三錢五味子五分菖蒲一錢歌曰腎虛亦使耳聾鳴磁石硃砂研要精苓澤山丹蒲味具山萸熟地使陰生眼目總訣眼皮腫痛貴分觀按經清散自然安若還雲霧暈花見補瀉隨宜屬腎肝大眼角腫或兼頭痛惡寒者太陽經風熱也宜加減敗毒散羌活一錢獨活一錢柴胡三錢前胡二錢赤芍二錢黃芩三錢玉竹三錢歸尾三錢木賊一錢花粉三錢甘草一錢連翹一錢銀花一錢蟬蛻七個歌曰眼腫兼寒屬太陽柴前羌獨芍芩詳銀蟬木賊天花粉甘草翹歸玉竹襄小眼角腫或兼口苦耳鳴者少陽經風火也宜加減柴胡湯沙參三錢白芍三錢柴胡三錢黃芩三錢當歸三錢膽草三錢牡蠣三錢木賊一錢青皮一錢蟬蛻七個銀花一錢菊花二錢甘草一錢生薑三片歌曰眼傷風火耳兼鳴木賊柴芩參芍清膽草歸蟬銀菊蠣青皮姜引使肝平下眼皮腫以及繞眼紅鎖者陽明經風熱也宜加味銀翹湯連翹一錢葛根二錢白芍三錢甘草一錢黃芩三錢生地三錢枳殼一錢銀花一錢白芷三錢花粉三錢蟬蛻七個青葙三錢石膏三錢紅花一錢歌曰陽明風熱眼皮傷芩葛銀翹芷芍將草地蟬花和枳殼石膏花粉共青葙伯未按蜀刻本無連翹紅花枳殼多大力子又按赤眼以黃丹白蜜調貼太陽穴亦能止痛目內癢痛以及赤白雲翳者肝經風濕熱也宜加減瀉肝湯歸尾三錢元參三錢梔子二錢黃芩二錢膽草二錢蟬蛻七個木賊一錢木通一錢銀花二錢赤芍二錢澤瀉二錢柴胡二錢防風二錢車前子二錢荊芥二錢青皮一錢枳殼一錢細辛五分酒軍五分紅花一錢甘草一錢歌曰目中痛翳芍芩梔柴澤荊防辛枳皮通賊銀蟬歸膽草花前參草酒軍施目光晦澀恍惚不能近視者肝腎真陰虛也宜杞菊地黃湯人參三錢白朮三錢遠志一錢黃耆三錢當歸三錢磁石煅三錢棗仁三錢龍眼三枚益智一錢五味五分甘草一錢硃砂研一錢歌曰不能遠視缺真陽參朮磁朱遠志良益智棗仁龍眼並草歸耆味細推詳唇口總訣口內時含五臟和偶然變味即為疴須知脾竅原通胃胃火為殃病最多口吐酸水或兼腹滿頭痛者肝木侮脾土也宜加味吳萸湯吳萸二錢黨參三錢黃連三錢生薑三錢大棗三枚歌曰吐酸只為木乘脾薑棗吳萸治總宜再入參連同煮服頭疼腹滿照方施口苦而渴或兼咽乾目眩者少陽經相火也宜加減柴胡湯柴胡三錢黃芩三錢黨參三錢花粉三錢生薑三片甘草一錢歌曰口苦咽乾眩渴連柴芩參草藥當先生津專賴天花粉發散生薑力量全口甜而膩或兼不思飲食者脾經傷厚味也宜加味香砂湯神麯一錢半夏三錢砂仁研一錢雲苓三錢藿香三錢楂肉一錢歌曰口中甜膩是脾傷半夏雲苓與藿香楂肉砂仁加入曲六般煎服效堪彰伯未按蜀刻本多白朮黨參甘草老蓮生薑檳榔白芍又按此即內經口甘證可時泡佩蘭湯飲之口淡無味兼見腹滿多唾者脾虛中有寒也宜加味理中湯黨參三錢白朮三錢生薑二錢茯苓四錢炙草二錢陳皮三錢歌曰口中無味唾偏多參朮姜苓炙草和漫道陳皮非補藥善調胃氣莫嫌他伯未按可時啖糖姜口中腫痛兼見發渴飲水者胃中火上衝也宜時方甘露飲天冬三錢麥冬三錢生地三錢熟地三錢黃芩三錢枳殼一錢茵陳三錢石斛三錢枇杷葉去毛蜜炙三錢甘草一錢歌曰口中腫痛渴煩加二地二冬及枇杷芩枳茵陳兼石斛草梢引服效無瘥伯未按外用蘆根泡代茶口燥舌乾或兼消渴引飲者胃中陰液枯也宜加減地黃湯熟地三錢山藥三錢黨參三錢麥冬三錢澤瀉三錢五味一錢元參三錢花粉三錢山茱萸三錢葛根三錢歌曰口乾舌燥胃陰枯不解滋陰病不除萸地參冬山澤味元參花粉葛根扶口中腥臭或兼吐血衄血者胃中血燥熱也宜清陽寧血湯當歸三錢白芍三錢黃芩三錢黃連二錢黨參三錢麥冬三錢藕節三錢生地三錢蒲黃二錢酒軍八分枳殼一錢甘草一錢歌曰口中腥臭血當清歸芍芩連並黨參藕地軍蒲甘草枳麥冬清熱燥斯平鼻孔總訣肺氣通調鼻自安只宜疏散肺風寒卻因挾孔陽明脈惹出干清燥熱端鼻流清涕如有窒塞不通者肺經受風寒也宜加味香蘇飲香附二錢陳皮二錢紫蘇三錢薄荷一錢甘草一錢杏仁三錢辛夷二錢桔梗三錢歌曰鼻流清涕窒難通甘杏香陳蘇薄同溫肺辛夷偕桔梗散寒通竅奏奇功伯未按可加藁本八分鼻根紅赤孔內乾燥結煤者陽明經燥氣也宜加味升葛湯升麻一錢葛根三錢石膏研四錢黃芩三錢生地三錢白芍三錢枳殼一錢杏仁三錢甘草一錢花粉三錢白芷二錢銀花二錢連翹二錢歌曰鼻根紅赤屬陽明升葛膏芩地芍平枳杏草同花粉用銀翹白芷火能清鼻中流血或兼頭暈口渴者陽明經血燥也宜加味甘露飲生地三錢熟地三錢黃芩三錢麥冬三錢天冬三錢茵陳三錢石斛三錢枳殼一錢茅根二錢赤芍二錢藕節三錢蒲黃一錢銀花一錢甘草一錢歌曰鼻因燥熱血長流二地二冬芩芍優石斛茵陳蒲枳共銀茅藕節草均收伯未按可先用新絮蘸濃京墨汁或鮮生地塞鼻中更以手巾浸冷水掩額上以暫止之然後服藥鼻中生瘡無論腫痛塞癢者肝肺經痰火也宜三白注鼻丹內可服加味升葛湯見前二節白礬一錢火硝一錢硼砂一錢歌曰鼻內生瘡痛癢頻硝礬注鼻法當循滌痰除火無餘策再入硼砂研要勻齒牙總訣胃主牙床腎主牙補虛清熱各專家倘因風化生蟲䘌抵穴探巢外治誇牙齒疼痛由於生蟲蝕剝者風濕熱所化也宜外用烏梅化蟲散烏梅三枚川椒一錢乾薑一錢黃連二錢細辛五分黃柏一錢石膏三錢枯礬五分明雄一錢鉛粉一錢歌曰蟲蝕牙疼姜與辛椒連黃柏石膏遵烏梅再入枯礬碾鉛粉雄黃藥要真伯未按若因風寒而痛者以細辛嵌齒縫中牙齒腫痛或兼口舌皆痛者胃經之風火也宜清熱去風湯枯芩三錢石膏三錢知母二錢枳殼一錢丹皮三錢白芍三錢白芷二錢防風二錢銀花三錢連翹二錢山豆根二錢甘草一錢牛膝一錢牛蒡子一錢歌曰胃經風火腫傷牙知芍膏芩牛蒡加枳膝丹防甘草引豆翹白芷與銀花伯未按可用冰硼搽腫處或針刺出血少許勿令化膿牙痛不腫或腫不利涼藥者腎中之虛火也宜加減八味丸熟地三錢山藥三錢雲苓三錢澤瀉三錢丹皮三錢山茱萸三錢白芍三錢牛膝一錢麥冬三錢安桂八分骨碎補三錢附子一錢五分歌曰牙疼不腫腎虛浮地藥苓丹桂附求碎補山萸冬共澤芍同牛膝降兼收伯未按外治法用生附子熟地同搗敷足底心舌本總訣舌乃心苗胃亦診赤紅便作火來侵有胎屬火分真假枯潤之間仔細詳凡舌有胎或兼口苦溺黃者三焦經鬱熱也宜加味柴胡湯柴胡二錢黃芩二錢甘草一錢當歸三錢白芍三錢麥冬三錢車前子三錢花粉三錢知母三錢滑石三錢歌曰舌胎不論白和黃但有皆為熱內臟加味柴胡芩草粉知冬前滑芍歸良舌尖赤痛或生巨齒紅點者心經之遊火也宜加減瀉心湯黃芩三錢黃連二錢當歸三錢赤芍三錢丹皮三錢生地三錢花粉三錢連翹二錢車前子三錢木通一錢甘草一錢牛蒡子三錢歌曰舌尖赤痛用芩連牛蒡翹歸地芍先花粉車前丹草和木通瀉熱火全捐伯未按舌脹滿口生蒲黃末搽舌上若舌脹出口冰片一錢研敷舌胎黃燥兼見消渴引飲者胃中有熱邪也宜加味虎湯知母三錢石膏三錢花粉三錢酒軍一錢甘草一錢生地三錢枳殼一錢歌曰舌胎黃燥用知膏花粉軍甘地枳調白虎西方金氣稟再加清品散涼飈舌胎滑潤兼見二便清利者真寒而假熱也宜加味益元湯乾薑二錢附片三錢黃連二錢知母二錢黨參三錢白朮三錢五味八分吳萸二錢麥冬三錢艾葉一錢蔥白三根童便一杯歌曰舌胎滑潤便清和假熱真寒姜附科冬味知連蔥便引艾萸參朮不嫌多舌黑生刺手足日晡潮熱者胃中有燥屎也宜調胃承氣湯芒硝二錢大黃二錢枳殼二錢厚朴二錢甘草五分歌曰燥屎留中舌刺芒熱潮日晡細端詳硝黃枳樸同甘草調胃長沙有妙方舌黑生刺心煩不得安臥者心火之亢熱也宜銀翹瀉心湯黃柏二錢炒梔二錢黃連二錢黃芩三錢生地三錢白芍二錢花粉三錢銀花二錢連翹一錢竹茹二錢草梢一錢燈心一束歌曰舌生黑刺臥難安梔柏芩
body:
  text: 凡例一他書皆標證名是書原為不知醫者而設標出證名轉生迷眩故見某痛苦即收入某門分部分類最便查閱一是書雖簡略然每遇一證必究其源審知陰陽分別臟腑最為靈驗雖見病治病比時書卻高一格一婦人小兒除胎產麻痘外悉如男子治法且各有專書閱者能得此書之意再參各書自可辨其得失而取用不窮是書不多贅也一是書原無歌括苦於難記今按各節衍成絕句以便記誦一瘡傷跌打救絕等法是備急扶危之要務也附於卷末方法經驗當熟記之預備藥料以便濟世原敘備豫不虞古之善教而不虞之備莫要於醫高堂則風竹瓦霜膝下則新雛弱筍外而戚友中則己身偶有疾苦均資乎醫誠重矣哉顧醫之難也非讀書識字則不能醫非格物窮理則不能醫非通權達變更不能醫一旦攖非常之疾束手無策只得委任凡醫聽其措置為之醫者又復混亂陰陽顛倒寒熱投劑不中至於垂危明哲之士鑑前車思補救奮然求濟於方書而諸書率皆大海茫茫渺無涯涘深則摘要鉤元淺則捕風捉影倉皇檢閱兩俱無益病家既窮於醫又窮於書惟撫膺扼腕白恨其不能醫已耳噫醫固若是之難能已乎抑亦所見之書有未遽能者乎夫紀昌之射六年方工伯牙之琴三年未妙天下事安有一見而能者哉顧事之在所緩者不必求諸一見而事之在所急者要無取乎難能況不測之來危在頃刻非開卷瞭然之書何以供家俗急時之用余因感此集為是書即不知醫家臨證查對無不了如指掌且是書也雖非鉤元摘要之微亦匪捉影捕風之陋果能洞書中之言通言外之意將淺者見淺深者見深而吾一見能之裨於世用也詎有涯哉
  hash: sha256:a75ace38d2512bb69e1ea70b9249778b9e8f2f06c62904031fe8868860b71b8a

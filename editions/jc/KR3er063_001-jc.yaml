front:
  text: 序醫學見能四卷蜀天彭唐容川著僕得於江右之笥筐忽忽十餘載矣辭簡理周最有功於濟世蓋容川原為初學弟子與夫不知醫者說法故理不求深而方必錄驗較之務求艱奧而無俾實用者未可同日語也憶昔家君宦遊豫章幕府中人有以疾苦告者即檢方與之新發者覆杯即止久者三飲而已因是上下皆謂家君知醫而不知實得之此書之力洵可貴焉容川學通今古識超凡儔其所著中西匯通醫書五種不捨近而求遠不趨新奇而廢正道早刊行世已為學者奉若圭臬惜是書獨付闕如乃為校閱並附經驗簡效方於眉上以備採用即付手民嗚呼古人云為人子者不可不知醫僕謂為人父母者亦不可不知醫顧醫籍棼如難以遴擇聖言悠遠良匪易悟世傳驗方新編一盤珠珍珠囊等本源未澈瑕瑜互見殊憾理不足而方難效然則是書之出願醫者朝夕展玩凡為人子父母者去彼從此而各手一編廣醫學之識見助天地之生成獲益誠匪淺而其功又詎在作者下歟甲子八月上海秦之濟伯未氏序
  hash: sha256:ca944e741c5d187131048e57f49a704c61e874e1c9520b23127a72a70919bb2d

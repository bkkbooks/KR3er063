body:
  text: 卷首診法五臟心火臟主生血主藏神主周身脈絡主喜主笑開竅於舌肝木臟主行血主藏魂主周身筋膜主怒主驚開竅於目脾土臟主飲食主藏意主周身肌肉主思主噫開竅於口肺金臟主行氣主藏魄主周身皮毛主悲主咳開竅於鼻腎水臟主生氣主藏志主周身精髓主恐主欠開竅於耳外有包絡即心外衣為陰血布化之源又有命門即腎中系為真陽生氣之根六腑小腸者心之腑屬火主化食為液上奉心血膽者肝之腑屬木主升清降濁疏利中土胃者脾之腑屬土主納受水穀化氣化血大腸者肺之腑屬金主傳送糟粕消利滯氣膀胱者腎之腑屬水主氣衛皮毛通達小便三焦者胞絡命門之腑兼屬水火主行水化氣通陰達陽伯未按心惡熱肺惡寒肝惡風腎惡燥脾惡濕胃喜涼腸喜熱膽喜溫亦不可不知經氣足手太陽膀胱小腸經司寒水火化之氣手從足化統稱寒水經行身之後足手陽明胃大腸經司燥土燥金之氣足從手化統稱燥金經行身之前足手少陽膽三焦經司木火相火之氣足從手化統稱相火經行身之側足手太陰脾肺經司濕土清金之氣手從足化統稱濕土分部於大腹足手少陰腎心經司水陰君火之氣足從手化統稱君火分部於小腹足手厥陰肝包絡經司風木相火之氣手從足化統稱風木分部於軟脅伯未按十二經之部位手之三陰從臟走手手之三陽從手走頭足之三陽從頭走足足之三陰從足走腹又有督脈起於會陰循背而行身之後所以督率諸陽任脈起於會陰循腹而行身之前所以擔任諸陰衝脈亦起於會陰夾臍而上散胸中當諸氣之衝要一源而三岐統謂之奇經望色青色屬肝風邪也亦主脾寒黃色屬脾濕氣也亦主食積赤色屬心火熱也亦主假熱白色屬肺虛寒也亦主血脫黑色屬腎水氣也亦主腎虛聞聲肝志怒其聲呼其變罵詈心志喜其聲笑其變譫語脾志思其聲歌其變鄭聲肺志憂其聲哭其變失音腎志恐其聲呻其變氣短問證問病因七情六慾風寒暑濕飲食起居損傷驚恐之類是問病形痛癢寒熱喘咳煩渴吐利脹滿便閉抽掣之類是問病機朝甚暮愈暮熱朝寒進退盛衰變證兼證之類是問病情惡寒惡熱苦嘔苦滿欲食不食心煩不寐之類是切脈浮脈輕按即見主表實亦主裡氣內虛沉脈重按乃見主裡實亦主裡氣內虛遲脈一息三至主虛寒亦主在臟之病數脈一息六至主實熱亦主真寒假熱虛脈三部無力主諸虛亦主素稟不足實脈三部有力主諸實亦主素稟有餘大脈應指洪闊主病進亦主正氣內虛緩脈應指柔和主病退亦主胃氣有餘長脈過於三指主氣盛亦主陽盛陰虛短脈不滿三指主氣損亦主中有窒塞滑脈往來流利主血走亦主痰飲為病澀脈往來艱滯主血虛亦主瘀血凝積洪脈湧沸有力主實熱亦主內虛不足緊脈勁急無定主寒實亦主身體疼痛細脈窄小不粗主冷氣亦主血脈不足微脈模糊不顯主陽虛亦主元氣敗絕芤脈浮大中空主血亡亦主遺精小產弦脈端直中勁主木旺亦主痰飲內痛革脈浮極有力主陰亡亦主陽不入陰牢脈沉極有力主寒實亦主內有積聚濡脈浮細無力主氣虛亦主外受濕氣弱脈沉細無力主血虛亦主胃氣不盛動脈搖曳在關主驚氣亦主陰陽相搏伏脈沉潛著骨主邪閉亦主陰寒在內促脈數中時止主熱鬱亦主邪氣內陷結脈遲中時止主寒結亦主氣血漸衰代脈止有定候主氣絕亦主經隧有阻散脈去來繚亂主氣散亦主產婦之吉浮沉分表裡遲數定寒熱虛實分盛衰大緩辨進退長有餘而短不足滑流利而澀艱難寒熱緊洪俱屬實細微血氣總為虛芤中空而血亡故道弦中勁而木侮脾經革則陽氣外越牢則陰邪內固濡氣虛弱血虛虛各有別動氣搏伏氣閉氣總乖和結陰促陽辨遲與數代亡散絕有去無來脈法多端此為總索伯未按滑伯仁云脈之綱要不外浮沉遲數滑澀六者以其足統乎表裡陰陽虛實冷熱風寒濕燥臟腑氣血之病也又按中醫論生理主重臟腑經絡論診斷主重望聞問切以現代科學視之目多缺陷但中醫辨症用藥全賴於此越此範疇便無頭緒故唐氏此書本為不知醫者說法而首先提出殆有深意

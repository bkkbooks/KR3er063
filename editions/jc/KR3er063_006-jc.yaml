body:
  text: 卷四附錄救急總訣世人救急最當詳命在須臾實可傷因證施方莫疑忌挽回造化致嘉祥誤中菌毒嘔吐煩亂欲死者胸傷而氣逆也宜清胸滌毒飲地漿水一兩綠豆四錢甘草三錢銀花三錢滑石四錢歌曰菌毒須當飲地漿銀花滑石煮成湯再加綠豆和甘草甘緩調和體即康中一切毒無論藥石蟲蛇者皆風痰熱毒也宜解毒萬應丹雄黃一錢白礬一錢犀角四分連翹三錢銀花三錢甘草一錢滑石三錢防風一錢綠豆四錢射干一錢水煎微冷服歌曰百毒都須萬應丹雄礬犀角草防攢銀翹滑石能清熱綠豆仍宜入射干伯未按蛇咬傷搗蒜敷之蜈蚣咬蜒蚰搗塗蜂螫蚯蚓糞敷之中煤煙毒昏眩迷悶如死者炭氣閉肺竅也宜清涼解熱漿萊菔汁冷服為第一方又冷水自胸面灌服之又置冷地風吹則解後煎黃連石膏芒硝湯服之歌曰煤氣昏迷萊菔吞風吹身冷即能言膏連加入芒硝服一派清涼體不煩跌壓猝死血氣傷損昏迷者須曲拳堅抱也宜熱馬溺灌之如無馬溺用童便灌之再用桃仁紅花麝香酒軍童便並服歌曰跌壓昏迷抱要堅熱餐馬溺治當痊桃仁軍麝紅花煮童便加來效若仙夢魘猝死僵臥呼叫不醒者痰氣閉竅道也宜通關開竅丹皂角末一錢半夏末一錢五分歌曰夢魘須將皂夏吹通關開竅奏奇功只緣夢魘因痰閉取嚏除痰此法宜凡湯火傷不可冷水逼劫者熱氣恐內攻也宜黃連白虎湯石膏四錢知母三錢黃連五分甘草一錢五分花粉三錢淡竹葉二錢外用大黃末麻油調敷歌曰湯火傷宜用石膏知連甘草一鍋熬蔞根淡竹均清熱黃共油調外治高投水溺死水不得出閉氣者當撬口通竅也宜吹氣吹藥方用竹管吹兩耳用生半夏末吹鼻中用皂角末吹下部中水出則氣回歌曰溺死宜將兩耳吹復吹鼻內氣能回再將牙皂捶成粉下部吹來有轉機救自縊死恐其頸垂氣泄者當抵肛提發也宜推拿按摩方不可斷繩當解下放平一人提其發使頸直一人抵其肛使氣不泄再用兩人按摩推拿曲折手足復用竹管吹耳中良久取嚏進薑湯而活歌曰縊死宜將頂發提抵肛摩按漫推移再將竹管來吹耳緩進薑湯氣可回伯未按現在倘遇中毒等事情宜急送醫院救治切勿自療以免耽誤時機至要至要

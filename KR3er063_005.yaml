body:
  text: 卷三證治婦人調經總訣婦人經血屬於肝肝血調和病自安熱則先期寒縮後腹疼瘀血定相干經水先期其血紫黑煩怒者血分中有熱也宜加味四物湯生地三錢當歸三錢白芍三錢川芎一錢丹皮三錢枯芩三錢香附三錢柴胡二錢全皮三錢竹茹三錢歌曰經水先期紫色多地歸芎芍有專科丹芩地骨香柴竹熱退瘀行病即和伯未按經色不可不辨大抵色紅為正色紫有風色黑熱甚色淡為虛色黃濁者濕經水後期其血淡白疼痛者血分中有寒也宜當歸和血湯當歸三錢白芍三錢桂尖三錢細辛五分艾葉三錢阿膠三錢甘草一錢生地三錢木通一錢香附三錢大棗三枚法夏三錢雲苓三錢生薑一錢歌曰經期縮後色微紅歸芍膠辛桂艾同香附生薑添棗草雲苓法夏地和通經水過多以及漏下不止者衝任之虛崩也宜千金膠薑湯生地三錢川芎一錢白芍三錢鹿角霜二錢當歸三錢牡蠣三錢艾葉二錢阿膠二錢甘草一錢炮姜一錢附子二錢棕灰一錢歌曰經水嫌多衝任虛歸芎地芍藥當儲膠姜鹿牡棕和艾草附溫經暖氣噓伯未按方中加醋炒烏鰂骨三錢尤佳經水過少以及乾枯發熱者胞宮之血虛也宜加味四物湯麥冬二錢當歸二錢川芎八分白芍一錢五分生地三錢棗仁三錢臺烏藥一錢遠志一錢香附一錢五分茯苓三錢甘草八分阿膠一錢五分人參一錢五分歌曰經行過少或乾枯四物歸芎地芍俱遠志冬參香附與臺烏棗草獲苓須經前腹痛以及行經不利者血分有瘀滯也宜加味香蘇散當歸三錢白芍三錢陳皮二錢元胡索二錢桃仁三錢香附三錢蘇梗三錢柴胡二錢丹皮三錢甘草一錢歌曰經前腹痛血瘀停歸芍元胡破血靈再入桃丹香附草柴陳蘇梗善調經經後腹痛以及經水減少者血虛而不足也宜加味補血湯黃耆三錢當歸三錢白朮三錢人參二錢香附二錢川芎一錢熟地三錢歌曰血已行時腹痛加此非瘀痛認休差耆歸芎術同香附地共人參補血誇漏下白物有如米飲不絕者脾濕因帶下也宜茵陳四苓湯茵陳三錢雲苓三錢豬苓三錢菖蒲一錢澤瀉三錢萆薢三錢甘草一錢有寒加益智桂技有熱加黃芩黃柏歌曰白帶脾傷萆薢宜二苓菖澤草茵施寒加益智還兼桂熱入黃芩與柏隨伯未按豆蔻花巴戟芡實赤苓鹽水炒車前烏賊骨山藥金櫻子蒼朮柴胡澤瀉鹽水炒黃柏治一切帶下神效婦人安胎總訣安胎脾是大源頭萬物生成土力優腎主系胞亦宜固肝司胞血更當求胎中嘔吐數次發惡不休者脾胃氣阻滯也宜香砂六君湯木香一錢砂仁二錢白朮三錢雲茯苓三錢當歸三錢陳皮三錢半夏二錢甘草一錢生薑三片大棗二枚歌曰胎中嘔吐用香附術草參苓一例加脾胃調和陳與夏方知用藥不相差胎中心煩兼見口渴頭暈者心胃之虛火也宜安胎清火湯當歸三錢白芍二錢白朮三錢黃芩一錢五分澤瀉三錢知母三錢麥冬一錢五分雲苓三錢沙參一錢五分竹葉一錢五分歌曰胎里心煩暈渴兼知芩歸芍術參添茯苓竹葉和冬澤清熱安胎火不災伯未按經停三月欲知是胎非胎可用川芎一錢空心煎艾湯調下如腹動者胎也臍下動者瘕也不動者血瘀也胎中腰痛過甚則恐胎墮者帶脈之懈弛也宜加味固胎丸杜仲三錢熟地三錢故紙三錢淮山藥三錢當歸三錢續斷三錢白朮三錢人參一錢歌曰胎中腰痛恐傷胎山藥當歸地紙裁杜仲人參同續斷再加白朮土能培胎中腹痛痛甚亦能墮胎者胎氣之不和也宜調氣安胎飲當歸三錢木香一錢雲苓三錢白芍一錢五分香附一錢五分紫蘇一錢五分苧麻根二錢歌曰胎中腹痛氣當調歸芍雲苓力最饒蘇梗木香香附子麻根加入孕難搖伯未按胎動欲下者急以苧麻根三錢龍眼肉半兩二味濃煮與服余已治多人均效胎前屎結以及口乾惡熱者血虛而胎燥也宜麻仁養血湯火麻仁三錢杏仁三錢當歸三錢黃芩一錢五分白芍二錢麥冬二錢甘草八錢歌曰胎前屎結血多虧杏芍麻仁總潤脾加入當歸芩麥草滋陰補血見功奇胎前溺黃以及黃濁不利者胞熱而水滯也宜龍膽清熱湯當歸三錢生地四錢澤瀉三錢膽草一錢五分木通八分梔子一錢五分黃芩一錢五分白芍一錢五分甘草八分淡竹葉一錢五分歌曰胎前細審溺來黃龍膽梔芩煮作湯歸芍地通和澤瀉甘梢淡竹共匡襄胎胞下壓小便不得下出者胞系之不舉也宜八味腎氣丸熟地三錢山萸三錢山藥三錢麥冬一錢五分雲苓三錢澤瀉三錢安桂二分丹皮一錢五分附片五分玉竹一錢五分歌曰轉胞下壓溺難通澤地丹萸苓藥同玉竹麥冬和桂附休疑毒熱把胎攻伯未按方中可加升麻八分胎胞上逼心中煩悶不安者血虛而火迫也宜養胃清降湯人參一錢白朮三錢淮山藥三錢白芍一錢五分當歸二錢雲苓三錢甘草八分大棗二枚阿膠一錢五分生地三錢棗仁三錢麥冬一錢五分歌曰胎胞上逼甚煩心參朮膠歸儘量斟芍地苓冬山藥草棗仁大棗助滋陰胎前水腫以及腹中脹滿者胞宮水不化也宜加味防己湯防己二錢澤瀉三錢腹皮二錢姜皮一錢五分桔梗八分苓皮三錢杏仁三錢草梢八分桑皮一錢五分當歸二錢歌曰胎前水腫澤防通姜腹苓皮桑白同杏桔草梢歸尾共能將水氣化胞宮胎前咳嗽以及嗆嘔不安者子咳與子嗆也宜調肺平肝湯桔梗八分枳殼一錢五分杏仁三錢雲苓三錢百合三錢生地三錢前胡一錢五分當歸一錢五分麥冬一錢五分紫菀一錢五分歌曰胎前咳嗽嗆難安枳桔雲苓百合餐前杏地歸冬共菀不離平肺與平肝婦人保產總訣婦人新產莫言虛恐是瘀停內阻持若是瘀行商補劑養陽不若養陰宜將產之期預備滑胎催生者必調和氣血也宜保產無憂散白芍二錢黃耆八分菟絲一錢當歸一錢五分厚朴七分艾葉七分芥穗八分枳殼六分川芎一錢五分貝母一錢羌活五分甘草五分生薑一片歌曰預備催生藥餌投歸芎耆芍保無憂再加菟樸同羌枳姜貝甘草芥艾儔伯未按此方極輕功效甚大臨產催生交骨結而不開者血氣不活動也宜加味佛手散當歸五錢川芎三錢龜板八錢血餘三錢歌曰臨產催生不用忙歸芎龜板血餘良方名佛手真奇效生子無虞母體傷伯未按若兒下而胞不下者急用酒洗當歸二兩川芎五錢益母草乳香沒藥各一兩黑芥穗三錢煎服但有產科醫院者以送院治療為最妥新產之初腹痛暈頭等症者瘀血相攻衝也宜加味失笑散當歸三錢川芎二錢靈脂二錢蒲黃一錢五分童便一杯歌曰新產之初瘀要行歸芎靈脂急須烹蒲黃童便還加入痛暈煩迷更莫驚產後瘀盡諸虛百損並見者氣血大虧損也宜十全大補湯生地三錢白芍二錢川芎一錢黨參三錢白朮三錢雲苓三錢當歸二錢甘草八分安桂三分黃耆三錢歌曰產後瘀行氣血虧歸芎地芍術參醫雲苓甘草和耆桂調理精神體不疲小兒外證總訣小兒外證求太陽三字方中明訓彰究與大人同治法不須科別擅偏長小兒發熱兼見惡寒頭痛者太陽經傷寒也宜人參敗毒散人參二錢羌活二錢獨活二錢柴胡二錢前胡三錢川芎一錢桔梗三錢雲苓三錢枳殼一錢甘草一錢葛根二錢大棗二枚蔥白一根生薑三片歌曰小兒發熱系傷寒敗毒人參獨與羌再用柴前芎枳桔苓蔥甘棗葛生薑伯未按用淡豆豉三錢蔥白五個煎服亦好小兒口噤手足抽掣痰潮者傷風動痰火也宜羌活息風湯羌活一錢竹瀝二錢半夏二錢南星一錢五分生地三錢防風一錢殭蠶三錢薑汁五滴天麻一錢五分甘草八分枯芩一錢五分枳殼一錢五分犀角二分羚羊角三分歌曰小兒口噤又痰潮夏瀝羌星風火消芩地蠶麻姜枳草羚防犀角力偏饒小兒內證總訣小兒內證求太陰修園有語特叮嚀集中所列無他證他證皆當即此尋初生小兒屈腰啼叫不休者瘀血積腹內也宜用下瘀湯桃仁三錢靈脂三錢木香一錢厚朴一錢枳殼二錢丹皮一錢五分歌曰初生兒便哭無休腰屈應知瘀血留靈脂桃仁丹枳殼木香厚朴一方投小兒腹痛以及脹滿吐瀉者總責太陰經也宜香砂六君湯木香一錢砂仁二錢白朮三錢雲苓三錢黨參三錢陳皮三錢半夏二錢甘草一錢生薑三片大棗二枚歌曰小兒吐瀉腹疼加用藥仍宜香與砂苓草參甘陳夏共扶脾理氣效堪誇小兒食積手足熱而腹痛者脾胃不運化也宜加減平胃散蒼朮一錢厚朴一錢甘草八分陳皮一錢五分神麯三錢麥芽三錢山楂二錢黃連三分生薑二片白芍二錢歌曰腹痛知兒飲食停草姜楂樸效殊靈蒼陳麥曲連同芍脾胃調和病即寧伯未按飯焦炒透和砂仁研細為消食妙品小兒黃瘦以及腹大潮熱者脾胃之疳疾也宜已疳胡連湯枳殼一錢五分山楂一錢五分麥芽三錢蕪荑一錢五分胡黃連二錢白芍一錢五分生薑二片甘草一錢腹皮一錢銀柴胡二錢歌曰小兒疳疾瘦兼黃楂麥蕪荑枳草詳腹共胡連柴共芍理脾仍要用生薑外科瘡證總訣癰疽早治勿延遲寒熱相蒸已就時初起急當消散法成膿托毒是相宜瘡癰初起紅腫而極痛癢者風火血相結也宜消散撤癰散歸尾三錢紅花八分銀花三錢赤芍一錢五分黃連二分杏仁三錢甘草一錢連翹三錢紫蘇一錢五分花粉三錢黃柏一錢五分荊芥一錢五分乳香八分黃芩一錢五分防己二錢歌曰瘡癰初起痛兼紅歸芍銀連杏草攻蘇芥紅花翹黃柏芩防花粉乳香通伯未按凡毒初起欲其不大用蜒蚰灰生大黃各四兩五倍子白芨各二兩生半夏白蘞各二兩百草霜礬紅生南星陳小粉草烏各一兩熊膽一錢共研末以廣膠化烊芙蓉葉絞汁共量和搗成錠醋磨圍之有效癰疽初起白陷而不痛癢者氣滯寒痰聚也宜宣陽撤疽湯麻黃八分乳香八分沒藥八分桂枝一錢五分大棗三枚黃耆三錢遠志一錢蔻殼八分煨姜一錢五分甘草一錢歌曰瘡疽色白要宣揚沒藥麻黃及乳香遠志黃耆同蔻草再加大棗桂枝姜凡瘡初起無論紅白寒熱者當破血行氣也宜外敷百效散白芷六分細辛五分川烏八分南星一錢五分草烏一錢陳皮二錢薑黃一錢黃連三分大黃一錢五分遠志一錢黃柏一錢五分梔子一錢五分雄黃一錢五穀蟲三錢白礬一錢白芨一錢共為細末醋酒合調蒸熱厚敷即散已成者留頂即穿歌曰氣血凝時瘡始成二烏辛芷伴南星軍連雄柏薑黃入梔芨蟲礬敷上精凡瘡已成欲其化膿速潰者當排膿內托也宜黃耆托裡湯黃耆三錢當歸三錢遠志一錢皂刺一錢五分銀花三錢花粉三錢生薑三片大棗三枚山甲一錢五分甘草一錢歌曰瘡已成時欲化膿黃耆托裡志歸功銀花皂甲同薑棗花粉甘梢煮汁濃凡瘡已潰膿腐不能速去者當化腐去毒也宜消凝還肌丹巴豆一錢雄黃一錢共為末炒至黑色研細納瘡孔中化腐提膿再用乳香沒藥炒過加麝香少許研末提膿生肌再加珍珠更妙外貼萬應膏歌曰瘡膿已潰腐難消巴豆雄黃力最饒乳沒珍珠同麝研生肌專賴二方調瘡後陽虛食少體寒便滑者衛氣不充足也宜十全大補湯茯苓三錢甘草二錢生地二錢人參一錢五分當歸三錢川芎二錢白芍二錢黃耆三錢安桂四分生薑二片大棗四枚歌曰瘡後陽虛氣不充參耆苓草四般同歸芎術芍和安桂大補仍資薑棗功瘡後陰虛煩渴便黃髮熱者營血不滋養也宜四物養營湯生地三錢當歸三錢玉竹二錢茯苓三錢連翹三錢川芎一錢五分白芍一錢五分黨參二錢五分麥冬一錢五分銀花三錢杏仁三錢竹茹一錢五分甘草八分歌曰瘡後陰虛溺便黃歸芎四物養營湯地苓參芍銀翹竹玉竹甘冬杏子良刀傷跌打總訣跌打刀傷須急施煎湯何似外敷宜若雲手術須靈捷險症還延專此醫刀傷亡血口渴心煩氣喘者陰亡而陽越也宜滋陰養陽湯人參三錢黃耆三錢麥冬三錢五味一錢棗仁三錢熟地四錢白芍二錢當歸二錢川芎二錢茯苓三錢甘草一錢歌曰刀傷渴喘並心煩冬味參耆急與吞地芍歸芎苓共草棗仁加入斂真元刀傷冒風發腫發痙發抽者血虛筋失養也宜滋血養肝湯生地三錢當歸三錢白芍二錢竹茹一錢五分續斷二錢秦艽一錢五分元參一錢五分麥冬一錢五分黃芩一錢五分花粉三錢鉤藤三錢蘇梗一錢殭蠶三錢甘草一錢外用蔥白蟬蛻末炒熱包傷口歌曰刀傷變症為傷風艽續參歸地芍通冬竹蠶藤芩草梗內兼花粉外蟬蔥刀傷潰爛成膿流水不止者血瘀而化膿也宜提膿化瘀散花蕊石一錢五分乳香一錢五分沒藥一錢五分煅龍骨二錢冰片為末納入外貼感應膏歌曰刀傷潰爛水長流乳沒還同花蕊投冰片再加龍骨煅五般細研口能收四肢頭面跌打損傷疼痛者經絡有死血也宜通瘀達滯湯歸尾三錢紅花一錢荊芥一錢桃仁三錢續斷二錢紫蘇一錢五分丹皮一錢五分白芍一錢五分竹茹一錢五分川芎八分乳香八分沒藥八分蚯蚓二條甘草一錢如接骨再加自然銅為末重煎沖服歌曰跌打傷頭與四肢紅花歸芍芥芎施桃蘇乳沒蚯丹續童便然銅茹草醫腰腹胸背跌打損傷疼痛者膜內有死血也宜化瘀逐血湯蒲黃一錢五分丹皮一錢五分靈脂一錢五分赤芍一錢五分桃仁二錢歸尾二錢牛膝二錢續斷二錢白芍二錢荊芥一錢五分甘草八分童便半杯沖服歌曰損傷腹背與腰胸蒲炒丹皮歸尾從二芍桃牛和續斷芥靈甘草便煎濃跌打損傷無論何處腫痛者當散血使消也宜火煨酒調散官桂四分丁香十隻小茴香八分紅米八分火酒一杯八角茴香八分調加水少許火煨熱敷用布包裹之歌曰損傷總要血瘀消官桂丁香外治饒八角茴香同米研還加少許酒來調伯未按婦科最重胎產小兒病症易變外傷尤多危急宜送當地醫療機構檢查處理本書所載雖有可取幸勿依靠自誤
